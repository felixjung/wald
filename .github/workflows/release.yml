name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate tokens and repo permissions
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_REPO: felixjung/wald
          HOMEBREW_TAP_REPO: felixjung/homebrew-tap
        run: |
          set -euo pipefail

          if ! command -v jq >/dev/null 2>&1; then
            echo "::error::jq is required for token preflight checks."
            exit 1
          fi

          failures=0

          require_secret() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "::error::Missing required secret: $name."
              failures=$((failures + 1))
            fi
          }

          accepted_permissions_from_headers() {
            local headers="$1"
            local accepted
            accepted="$(awk -F': ' 'tolower($1)=="x-accepted-github-permissions"{print $2}' "$headers" | tr -d '\r')"
            if [[ -n "$accepted" ]]; then
              echo "Required permissions hint: ${accepted}"
            fi
          }

          check_repo_read_access() {
            local token="$1"
            local repo="$2"
            local label="$3"
            local body http_code message can_push

            body="$(mktemp)"
            http_code="$(curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}")"

            if [[ "$http_code" != "200" ]]; then
              message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
              if [[ -z "$message" || "$message" == "null" ]]; then
                message="unknown error"
              fi
              echo "::error::${label} cannot access ${repo} (HTTP ${http_code}): ${message}"
              rm -f "$body"
              failures=$((failures + 1))
              return
            fi

            can_push="$(jq -r '.permissions.push // false' "$body")"
            if [[ "$can_push" == "true" ]]; then
              echo "::notice::${label} user has push access to ${repo}."
            else
              echo "::warning::${label} user does not report push access to ${repo} (permissions.push=false)."
            fi

            rm -f "$body"
          }

          check_endpoint_read_access() {
            local token="$1"
            local endpoint="$2"
            local label="$3"
            local capability="$4"
            local body http_code message

            body="$(mktemp)"
            http_code="$(curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/${endpoint}")"

            if [[ "$http_code" != "200" ]]; then
              message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
              if [[ -z "$message" || "$message" == "null" ]]; then
                message="unknown error"
              fi
              echo "::error::${label} cannot access ${capability} endpoint (${endpoint}, HTTP ${http_code}): ${message}"
              rm -f "$body"
              failures=$((failures + 1))
              return
            fi

            rm -f "$body"
          }

          check_release_create_permission() {
            local token="$1"
            local repo="$2"
            local label="$3"
            local headers body http_code message hint

            headers="$(mktemp)"
            body="$(mktemp)"
            http_code="$(curl -sS -D "$headers" -o "$body" -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases" \
              -d '{"tag_name":""}')"

            if [[ "$http_code" == "422" || "$http_code" == "400" ]]; then
              rm -f "$headers" "$body"
              return
            fi

            hint="$(accepted_permissions_from_headers "$headers")"
            if [[ "$http_code" == "403" ]]; then
              message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
              echo "::error::${label} cannot create releases in ${repo} (HTTP 403): ${message}"
              if [[ -n "$hint" ]]; then
                echo "::error::${hint}"
              fi
              rm -f "$headers" "$body"
              failures=$((failures + 1))
              return
            fi

            message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
            echo "::error::Unexpected response while probing release creation in ${repo} (HTTP ${http_code}): ${message}"
            if [[ -n "$hint" ]]; then
              echo "::error::${hint}"
            fi
            rm -f "$headers" "$body"
            failures=$((failures + 1))
          }

          check_git_ref_write_permission() {
            local token="$1"
            local repo="$2"
            local label="$3"
            local headers body http_code message hint

            headers="$(mktemp)"
            body="$(mktemp)"
            http_code="$(curl -sS -D "$headers" -o "$body" -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/git/refs" \
              -d "{\"ref\":\"refs/tags/release-permission-probe-${GITHUB_RUN_ID}\",\"sha\":\"0000000000000000000000000000000000000000\"}")"

            if [[ "$http_code" == "422" || "$http_code" == "400" ]]; then
              rm -f "$headers" "$body"
              return
            fi

            hint="$(accepted_permissions_from_headers "$headers")"
            if [[ "$http_code" == "403" ]]; then
              message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
              echo "::error::${label} cannot create refs/tags in ${repo} (HTTP 403): ${message}"
              if [[ -n "$hint" ]]; then
                echo "::error::${hint}"
              fi
              echo "::error::Fine-grained PATs often need Workflows: Read and write in addition to Contents: Read and write for git ref creation."
              rm -f "$headers" "$body"
              failures=$((failures + 1))
              return
            fi

            message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
            echo "::error::Unexpected response while probing git ref creation in ${repo} (HTTP ${http_code}): ${message}"
            if [[ -n "$hint" ]]; then
              echo "::error::${hint}"
            fi
            rm -f "$headers" "$body"
            failures=$((failures + 1))
          }

          require_secret "RELEASE_PLEASE_TOKEN" "${RELEASE_PLEASE_TOKEN}"
          require_secret "HOMEBREW_TAP_GITHUB_TOKEN" "${HOMEBREW_TAP_GITHUB_TOKEN}"

          if (( failures > 0 )); then
            exit 1
          fi

          check_repo_read_access "${RELEASE_PLEASE_TOKEN}" "${RELEASE_REPO}" "RELEASE_PLEASE_TOKEN"
          check_endpoint_read_access "${RELEASE_PLEASE_TOKEN}" "repos/${RELEASE_REPO}/pulls?per_page=1" "RELEASE_PLEASE_TOKEN" "pull request"
          check_endpoint_read_access "${RELEASE_PLEASE_TOKEN}" "repos/${RELEASE_REPO}/issues?per_page=1" "RELEASE_PLEASE_TOKEN" "issue"
          check_release_create_permission "${RELEASE_PLEASE_TOKEN}" "${RELEASE_REPO}" "RELEASE_PLEASE_TOKEN"
          check_git_ref_write_permission "${RELEASE_PLEASE_TOKEN}" "${RELEASE_REPO}" "RELEASE_PLEASE_TOKEN"
          check_repo_read_access "${HOMEBREW_TAP_GITHUB_TOKEN}" "${HOMEBREW_TAP_REPO}" "HOMEBREW_TAP_GITHUB_TOKEN"
          check_git_ref_write_permission "${HOMEBREW_TAP_GITHUB_TOKEN}" "${HOMEBREW_TAP_REPO}" "HOMEBREW_TAP_GITHUB_TOKEN"

          if (( failures > 0 )); then
            echo "::error::Token preflight checks failed with ${failures} issue(s)."
            exit 1
          fi

          echo "::notice::Token preflight checks passed."

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release tag
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        run: |
          git fetch --force --tags
          git checkout "tags/${{ steps.release.outputs.tag_name }}"

      - name: Set up Go
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
