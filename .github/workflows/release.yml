name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          failures=0

          require_secret() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "::error::Missing required secret: $name."
              failures=$((failures + 1))
            fi
          }

          require_secret "RELEASE_PLEASE_TOKEN" "${RELEASE_PLEASE_TOKEN}"
          require_secret "HOMEBREW_TAP_GITHUB_TOKEN" "${HOMEBREW_TAP_GITHUB_TOKEN}"

          if (( failures > 0 )); then
            exit 1
          fi

          echo "::notice::Required release secrets are set."

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release tag
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        run: |
          git fetch --force --tags
          git checkout "tags/${{ steps.release.outputs.tag_name }}"

      - name: Set up Go
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.tag_name != '' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
