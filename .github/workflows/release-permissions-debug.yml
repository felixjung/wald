name: Release Permissions Debug

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  token-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Validate token permissions
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_REPO: felixjung/wald
          HOMEBREW_TAP_REPO: felixjung/homebrew-tap
        run: |
          set -euo pipefail

          if ! command -v jq >/dev/null 2>&1; then
            echo "::error::jq is required for token debug checks."
            exit 1
          fi

          failures=0

          require_secret() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "::error::Missing required secret: $name."
              failures=$((failures + 1))
            else
              echo "::notice::${name} is set."
            fi
          }

          print_identity() {
            local token="$1"
            local label="$2"
            local headers body http_code message login scopes

            headers="$(mktemp)"
            body="$(mktemp)"
            http_code="$(curl -sS -D "$headers" -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user")"

            if [[ "$http_code" != "200" ]]; then
              message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
              if [[ -z "$message" || "$message" == "null" ]]; then
                message="unknown error"
              fi
              echo "::error::${label} is invalid for GitHub API user lookup (HTTP ${http_code}): ${message}"
              rm -f "$headers" "$body"
              failures=$((failures + 1))
              return
            fi

            login="$(jq -r '.login // "unknown"' "$body")"
            scopes="$(awk -F': ' 'tolower($1)=="x-oauth-scopes"{print $2}' "$headers" | tr -d '\r')"
            if [[ -z "$scopes" ]]; then
              scopes="not exposed (expected for fine-grained PATs)"
            fi

            echo "::notice::${label} authenticates as ${login}."
            echo "::notice::${label} x-oauth-scopes: ${scopes}."
            rm -f "$headers" "$body"
          }

          check_repo_write_access() {
            local token="$1"
            local repo="$2"
            local label="$3"
            local body http_code message can_push

            body="$(mktemp)"
            http_code="$(curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}")"

            if [[ "$http_code" != "200" ]]; then
              message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
              if [[ -z "$message" || "$message" == "null" ]]; then
                message="unknown error"
              fi
              echo "::error::${label} cannot access ${repo} (HTTP ${http_code}): ${message}"
              rm -f "$body"
              failures=$((failures + 1))
              return
            fi

            can_push="$(jq -r '.permissions.push // false' "$body")"
            if [[ "$can_push" != "true" ]]; then
              echo "::error::${label} lacks repository write access to ${repo} (permissions.push=false)."
              rm -f "$body"
              failures=$((failures + 1))
              return
            fi

            echo "::notice::${label} has repository write access to ${repo}."
            rm -f "$body"
          }

          check_endpoint_access() {
            local token="$1"
            local endpoint="$2"
            local label="$3"
            local capability="$4"
            local body http_code message

            body="$(mktemp)"
            http_code="$(curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/${endpoint}")"

            if [[ "$http_code" != "200" ]]; then
              message="$(jq -r '.message // "unknown error"' "$body" 2>/dev/null || true)"
              if [[ -z "$message" || "$message" == "null" ]]; then
                message="unknown error"
              fi
              echo "::error::${label} cannot access ${capability} endpoint (${endpoint}, HTTP ${http_code}): ${message}"
              rm -f "$body"
              failures=$((failures + 1))
              return
            fi

            echo "::notice::${label} can access ${capability} endpoint."
            rm -f "$body"
          }

          require_secret "RELEASE_PLEASE_TOKEN" "${RELEASE_PLEASE_TOKEN}"
          require_secret "HOMEBREW_TAP_GITHUB_TOKEN" "${HOMEBREW_TAP_GITHUB_TOKEN}"

          if (( failures > 0 )); then
            exit 1
          fi

          print_identity "${RELEASE_PLEASE_TOKEN}" "RELEASE_PLEASE_TOKEN"
          print_identity "${HOMEBREW_TAP_GITHUB_TOKEN}" "HOMEBREW_TAP_GITHUB_TOKEN"

          check_repo_write_access "${RELEASE_PLEASE_TOKEN}" "${RELEASE_REPO}" "RELEASE_PLEASE_TOKEN"
          check_endpoint_access "${RELEASE_PLEASE_TOKEN}" "repos/${RELEASE_REPO}/pulls?per_page=1" "RELEASE_PLEASE_TOKEN" "pull request"
          check_endpoint_access "${RELEASE_PLEASE_TOKEN}" "repos/${RELEASE_REPO}/issues?per_page=1" "RELEASE_PLEASE_TOKEN" "issue"
          check_repo_write_access "${HOMEBREW_TAP_GITHUB_TOKEN}" "${HOMEBREW_TAP_REPO}" "HOMEBREW_TAP_GITHUB_TOKEN"

          if (( failures > 0 )); then
            echo "::error::Permission debug checks failed with ${failures} issue(s)."
            exit 1
          fi

          echo "::notice::All permission debug checks passed."
